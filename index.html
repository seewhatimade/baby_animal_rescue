<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baby Animal Rescue!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #controls {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 10;
  }
  .ctrl-group { display: flex; gap: 8px; pointer-events: auto; align-items: flex-end; }
  .ctrl-pad {
    display: grid;
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 64px 64px;
    gap: 4px;
  }
  .ctrl-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.35); }
  .ctrl-btn.cage {
    background: rgba(255, 200, 60, 0.5);
    border-color: rgba(255, 230, 120, 0.85);
    color: #5a3000;
    font-weight: bold;
    font-size: 14px;
  }
  .ctrl-btn.cage:active { background: rgba(255, 220, 100, 0.75); }
  .ctrl-spacer { width: 64px; height: 64px; }
  @media (min-width: 800px) { #controls { display: none; } }
</style>
</head>

<canvas id="game"></canvas>
<div id="controls">
  <div class="ctrl-group">
    <div class="ctrl-pad">
      <div class="ctrl-spacer"></div>
      <div class="ctrl-btn" id="btn-up">&#x2B06;</div>
      <div class="ctrl-spacer"></div>
      <div class="ctrl-btn" id="btn-left">&#x2B05;</div>
      <div class="ctrl-btn" id="btn-down">&#x2B07;</div>
      <div class="ctrl-btn" id="btn-right">&#x27A1;</div>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn cage" id="btn-cage">CAGE</div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- World ---
const WORLD_W = 2400;
const GROUND_Y_RATIO = 0.78;
function groundY() { return H * GROUND_Y_RATIO; }

// =============================================================================
// AUDIO
// =============================================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let rotorNode = null;
function startRotor() {
  if (rotorNode) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 70;
  const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 18;
  const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 18;
  lfo.connect(lfoGain).connect(o.frequency);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
  const g = audioCtx.createGain(); g.gain.value = 0.04;
  o.connect(f).connect(g).connect(audioCtx.destination);
  o.start(t); lfo.start(t);
  rotorNode = { o, lfo, g };
}
function setRotorVolume(v) { if (rotorNode) rotorNode.g.gain.setTargetAtTime(v, audioCtx.currentTime, 0.1); }

function playWinch() {
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.value = 120;
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.1);
}
function playPickup() {
  const t = audioCtx.currentTime;
  [659, 784, 988].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.06);
    g.gain.linearRampToValueAtTime(0.10, t + i * 0.06 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.06 + 0.25);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.27);
  });
}
function playHeal() {
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047, 1319].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.08);
    g.gain.linearRampToValueAtTime(0.09, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.35);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.4);
  });
}
function playSparkle() {
  const t = audioCtx.currentTime;
  [1568, 1976, 2349].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.05);
    g.gain.linearRampToValueAtTime(0.06, t + i * 0.05 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.05 + 0.2);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.22);
  });
}
function playReunion() {
  const t = audioCtx.currentTime;
  [523, 659, 784, 988, 784, 988, 1175, 1319].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.10);
    g.gain.linearRampToValueAtTime(0.10, t + i * 0.10 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.10 + 0.4);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.10); o.stop(t + i * 0.10 + 0.45);
  });
}
function playWin() {
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.13);
    g.gain.linearRampToValueAtTime(0.13, t + i * 0.13 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.13 + 0.55);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.13); o.stop(t + i * 0.13 + 0.6);
  });
}
function playFootstep() {
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.18, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * 0.7;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.10, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 160;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}
function playRoar() {
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.6);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
  o.connect(f); f.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.75);
}
function playCrunch() {
  const t = audioCtx.currentTime;
  for (let k = 0; k < 3; k++) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, t + k * 0.1); g.gain.exponentialRampToValueAtTime(0.0001, t + k * 0.1 + 0.12);
    const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 800;
    src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t + k * 0.1);
  }
}
function playSadSound() {
  const t = audioCtx.currentTime;
  [440, 370, 311, 247].forEach((f, i) => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.18);
    g.gain.linearRampToValueAtTime(0.13, t + i * 0.18 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.18 + 0.45);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.18); o.stop(t + i * 0.18 + 0.5);
  });
}

// --- Procedural music: gentle major-key loop ---
const NOTE_FREQ = {
  C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196,    A3: 220,    B3: 246.94,
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392,    A4: 440,    B4: 493.88,
  C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46, G5: 783.99, A5: 880,
};
const MUSIC_LOOP = [
  ['C3', 'E5', true ], [null, 'G5', false], ['G3', 'C5', false], [null, 'E5', false],
  ['F3', 'A4', true ], [null, 'C5', false], ['C4', 'F5', false], [null, 'A4', false],
  ['G3', 'B4', true ], [null, 'D5', false], ['D4', 'G5', false], [null, 'B4', false],
  ['C3', 'C5', true ], [null, 'E5', false], ['E3', 'G5', false], [null, 'C5', false],
];
let musicState = { on: true, noteIdx: 0, nextNoteTime: 0, bpm: 96 };
function playMusicTone(t, freq, dur, type, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function playMusicKick(t) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
  g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.14);
}
function updateMusic() {
  if (!musicState.on) { musicState.nextNoteTime = 0; return; }
  if (audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  const eighthDur = 60 / musicState.bpm / 2;
  if (musicState.nextNoteTime < now) musicState.nextNoteTime = now + 0.05;
  while (musicState.nextNoteTime < now + 0.2) {
    const t = musicState.nextNoteTime;
    const [bass, melody, kick] = MUSIC_LOOP[musicState.noteIdx % MUSIC_LOOP.length];
    if (bass)   playMusicTone(t, NOTE_FREQ[bass],   eighthDur * 1.7,  'triangle', 0.04);
    if (melody) playMusicTone(t, NOTE_FREQ[melody], eighthDur * 0.85, 'sine',     0.026);
    if (kick)   playMusicKick(t);
    musicState.noteIdx++;
    musicState.nextNoteTime += eighthDur;
  }
}
function toggleMusic() {
  musicState.on = !musicState.on;
  if (!musicState.on) musicState.nextNoteTime = 0;
}

// =============================================================================
// INPUT
// =============================================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if ((e.key === 'm' || e.key === 'M') && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
    toggleMusic();
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startRotor();
}
canvas.addEventListener('mousedown', resumeAudio);
canvas.addEventListener('touchstart', resumeAudio, { passive: true });
window.addEventListener('keydown', resumeAudio);

const mobileKeys = { up:false, down:false, left:false, right:false, cage:false };
function setupBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys[key] = true; resumeAudio(); }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); mobileKeys[key] = false; });
  el.addEventListener('touchcancel', e => { mobileKeys[key] = false; });
  el.addEventListener('mousedown', () => { mobileKeys[key] = true; resumeAudio(); });
  el.addEventListener('mouseup', () => { mobileKeys[key] = false; });
  el.addEventListener('mouseleave', () => { mobileKeys[key] = false; });
}
setupBtn('btn-up', 'up');
setupBtn('btn-down', 'down');
setupBtn('btn-left', 'left');
setupBtn('btn-right', 'right');
setupBtn('btn-cage', 'cage');

// SNES gamepad (USB controller). D-pad = move, A/B = cage, START = advance, SELECT = music.
const GP_MAP = {
  DPAD_UP: 12, DPAD_DOWN: 13, DPAD_LEFT: 14, DPAD_RIGHT: 15,
  SELECT: 8, START: 9, A: 1, B: 0, X: 3, Y: 2, L: 4, R: 5
};
function getGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const p of pads) if (p) return p;
  return null;
}
function gpHeld(name) {
  const gp = getGamepad();
  if (!gp) return false;
  const i = GP_MAP[name];
  return i !== undefined && !!gp.buttons[i] && gp.buttons[i].pressed;
}
const _gpPrev = {};
function gpEdge(name) {
  const now = gpHeld(name);
  const was = _gpPrev[name] || false;
  _gpPrev[name] = now;
  return now && !was;
}

function isUp()    { return keys['ArrowUp']    || keys['w'] || mobileKeys.up    || gpHeld('DPAD_UP'); }
function isDown()  { return keys['ArrowDown']  || keys['s'] || mobileKeys.down  || gpHeld('DPAD_DOWN'); }
function isLeft()  { return keys['ArrowLeft']  || keys['a'] || mobileKeys.left  || gpHeld('DPAD_LEFT'); }
function isRight() { return keys['ArrowRight'] || keys['d'] || mobileKeys.right || gpHeld('DPAD_RIGHT'); }
function isCage()  { return keys[' '] || keys['Enter'] || mobileKeys.cage || gpHeld('A') || gpHeld('B'); }

function pollGamepad() {
  // Poll every mapped button each frame so edge state stays in sync.
  const a = gpEdge('A'), b = gpEdge('B'), x = gpEdge('X'), y = gpEdge('Y');
  const start = gpEdge('START'), select = gpEdge('SELECT');
  if (a || b || x || y || start || select) resumeAudio();
  if ((a || b || x || y || start) && (gameState === 'win' || gameState === 'gameover') && stateTimer > 30) {
    tryAdvance();
  }
  if (select) toggleMusic();
}

let heli, cage, camera;

// =============================================================================
// UTILITY
// =============================================================================
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnParticle(o) {
  particles.push(Object.assign({
    x:0, y:0, vx:0, vy:0, gravity:0,
    life:1, decay:0.02, size:3, color:'#fff', shape:'circle',
  }, o));
}
function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath(); ctx.arc(p.x - camera.x, p.y, p.size * Math.max(0.2, p.life), 0, Math.PI * 2); ctx.fill();
    } else if (p.shape === 'star') {
      drawStar(p.x - camera.x, p.y, p.size);
    } else if (p.shape === 'heart') {
      drawHeart(p.x - camera.x, p.y, p.size);
    }
    ctx.restore();
  }
}
function drawStar(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const rr = (i % 2 === 0) ? r : r * 0.45;
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
}
function drawHeart(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.4);
  ctx.bezierCurveTo(x, y - r * 0.2, x - r * 1.2, y - r * 0.2, x - r * 0.6, y + r * 0.6);
  ctx.lineTo(x, y + r * 1.2);
  ctx.lineTo(x + r * 0.6, y + r * 0.6);
  ctx.bezierCurveTo(x + r * 1.2, y - r * 0.2, x, y - r * 0.2, x, y + r * 0.4);
  ctx.fill();
}

class FloatText {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 1; this.vy = -1.2;
  }
  update() { this.y += this.vy; this.vy *= 0.97; this.life -= 0.018; }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.font = "bold 22px 'Comic Sans MS', cursive";
    ctx.textAlign = 'center';
    ctx.fillStyle = this.color;
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
    ctx.fillText(this.text, this.x - camera.x, this.y);
    ctx.restore();
  }
}

// =============================================================================
// LEVEL SETUP
// =============================================================================
function startLevel() {
  // Pick this run's theme — cycles through THEMES on each replay
  currentTheme = THEMES[currentThemeIdx % THEMES.length];

  // Place vet centered in the world
  VET.x = Math.round((WORLD_W - VET.w) / 2);

  // Spawn one baby of each species — 4 on each side of the vet
  babies = [];
  const positions = [200, 410, 620, 850, 1550, 1780, 2000, 2200];
  const shuffled = SPECIES.slice().sort(() => Math.random() - 0.5);
  for (let i = 0; i < shuffled.length; i++) {
    babies.push(makeBaby(shuffled[i], positions[i]));
  }

  // Generate obstacles (avoid baby positions and vet zone)
  obstacles = generateObstacles(currentTheme, positions);

  // Helicopter starts on the helipad (center-right of vet zone)
  heli = {
    x: helipadX(),
    y: H * 0.32,
    vx: 0, vy: 0, dir: 1,
    rotorPhase: 0, tailRotorPhase: 0, bobPhase: 0,
  };
  cage = {
    cableLength: 0, angle: 0, angVel: 0,
    x: heli.x, y: heli.y, passenger: null,
  };
  mommies = [];
  particles = [];
  floats = [];
  weatherParticles = [];
  rescuedCount = 0;
  eatenCount = 0;
  reunionTriggered = false;
  gameState = 'playing';
  stateTimer = 0;
  levelTimer = 0;
  lightningFlash = 0;
  screenShake = 0;
  clinicHealth = 1.0;
  // Dino spawns from a random side, after a short head-start for the player
  dino = makeDino(Math.random() < 0.5);
  cameraFollow(true);
}

function makeBaby(species, x) {
  return {
    id: ++idCounter,
    species,
    x, y: groundY() - babyHeight(species.id),
    homeX: x,
    state: 'injured',  // injured | boarding | in_cage | healing | healed | reuniting | leaving | gone
    healTimer: 0,
    targetX: x,
    walkPhase: Math.random() * Math.PI * 2,
    dir: Math.random() < 0.5 ? -1 : 1,
    bobPhase: Math.random() * Math.PI * 2,
    sparklePhase: 0,
    healedSlot: -1,
    mommy: null,
  };
}

function makeMommy(speciesId, fromLeft, baby) {
  // Mommies enter from just outside the vet area on alternating sides —
  // brisk reunion, both edges of the camera view show new mommies arriving.
  const startX = fromLeft ? VET.x - 200 : VET.x + VET.w + 200;
  return {
    speciesId,
    x: startX, y: groundY() - momHeight(speciesId),
    state: 'walking_to_baby',
    walkPhase: 0,
    dir: fromLeft ? 1 : -1,
    fromLeft,
    nuzzleTimer: 0,
    babyRef: baby,
    bobPhase: 0,
    leavingFrames: 0,
  };
}

function cameraFollow(snap) {
  if (!camera) camera = { x: 0 };
  const target = Math.max(0, Math.min(WORLD_W - W, heli.x - W / 2));
  if (snap) camera.x = target;
  else camera.x += (target - camera.x) * 0.08;
}

// =============================================================================
// CLOUDS / BACKGROUND
// =============================================================================
let cloudData = null;
function initClouds() {
  cloudData = [];
  const N = 26;
  for (let i = 0; i < N; i++) {
    cloudData.push({
      x: Math.random() * (WORLD_W + 600) - 300,
      y: 30 + Math.random() * 200,
      r: 16 + Math.random() * 22,
      vx: -(0.05 + Math.random() * 0.22),
    });
  }
}
function updateClouds() {
  if (!cloudData) initClouds();
  for (const c of cloudData) {
    c.x += c.vx;
    if (c.x < -300) c.x = WORLD_W + 300;
  }
}
function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x - r * 0.7, y, r * 0.65, 0, Math.PI * 2);
  ctx.arc(x, y - r * 0.3, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y, r * 0.7, 0, Math.PI * 2);
  ctx.arc(x + r * 0.2, y + r * 0.3, r * 0.65, 0, Math.PI * 2);
  ctx.fill();
}

function drawBackground() {
  const t = currentTheme;
  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    t.sky[0]);
  g.addColorStop(0.5,  t.sky[1]);
  g.addColorStop(0.85, t.sky[2]);
  g.addColorStop(1,    t.sky[3]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Lightning flash overlay (storm theme)
  if (lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,240,${(lightningFlash / 8) * 0.45})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Distant mountains (only on mountain theme — bigger, snow-capped)
  if (t.bigMountains) {
    ctx.save(); ctx.translate(-camera.x * 0.2, 0);
    for (let i = 0; i < 12; i++) {
      const mx = i * 240 + 60;
      const peakY = groundY() - 220 - (i % 3) * 40;
      ctx.fillStyle = i % 2 === 0 ? '#8a90a8' : '#7a8090';
      ctx.beginPath();
      ctx.moveTo(mx - 160, groundY());
      ctx.lineTo(mx, peakY);
      ctx.lineTo(mx + 160, groundY());
      ctx.closePath(); ctx.fill();
      // Snow cap
      ctx.fillStyle = '#fafafa';
      ctx.beginPath();
      ctx.moveTo(mx - 30, peakY + 35);
      ctx.lineTo(mx, peakY);
      ctx.lineTo(mx + 30, peakY + 35);
      ctx.lineTo(mx + 18, peakY + 38);
      ctx.lineTo(mx + 8, peakY + 32);
      ctx.lineTo(mx - 4, peakY + 38);
      ctx.lineTo(mx - 18, peakY + 32);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // Rolling hills (parallax)
  ctx.save(); ctx.translate(-camera.x * 0.3, 0);
  ctx.fillStyle = t.hillColor;
  for (let i = 0; i < 16; i++) {
    const mx = i * 200 + 40;
    const my = groundY() - 80 - (i % 3) * 22;
    ctx.beginPath();
    ctx.ellipse(mx, groundY(), 140, my < groundY() ? groundY() - my : 40, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }
  // Distant trees on hills
  ctx.fillStyle = t.treeColor;
  for (let i = 0; i < 10; i++) {
    const tx = 120 + i * 260;
    const ty = groundY() - 50;
    ctx.beginPath();
    ctx.moveTo(tx - 18, ty + 10);
    ctx.lineTo(tx, ty - 30);
    ctx.lineTo(tx + 18, ty + 10);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // Clouds (parallax) — darker on storm
  if (!cloudData) initClouds();
  if (t.id === 'storm') ctx.fillStyle = 'rgba(70,80,90,0.85)';
  else if (t.id === 'snow') ctx.fillStyle = 'rgba(255,255,255,0.7)';
  else ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const c of cloudData) {
    const sx = c.x - camera.x * 0.4;
    if (sx > -100 && sx < W + 100) drawCloud(sx, c.y, c.r);
  }

  // Ground
  const gy = groundY();
  const gg = ctx.createLinearGradient(0, gy, 0, H);
  gg.addColorStop(0, t.ground[0]); gg.addColorStop(1, t.ground[1]);
  ctx.fillStyle = gg; ctx.fillRect(0, gy, W, H - gy);

  // Grass tufts
  ctx.fillStyle = t.grass;
  for (let wx = 0; wx < WORLD_W; wx += 14) {
    const sx = wx - camera.x;
    if (sx < -10 || sx > W + 10) continue;
    ctx.fillRect(sx, gy - 2, 2, 3);
    ctx.fillRect(sx + 5, gy - 4, 2, 5);
  }

  // Snow piles dot the ground in winter
  if (t.id === 'snow') {
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 40; i++) {
      const wx = (i * 73.5) % WORLD_W;
      const sx = wx - camera.x;
      if (sx < -20 || sx > W + 20) continue;
      const ph = 4 + (i * 5) % 6;
      ctx.beginPath();
      ctx.ellipse(sx, gy + 2, 14, ph, 0, Math.PI, Math.PI * 2);
      ctx.fill();
    }
  }

  // Scattered flowers (skipped in snow/storm)
  if (t.flowerColors.length > 0) {
    ctx.save();
    for (let i = 0; i < 60; i++) {
      const wx = (i * 137.5) % WORLD_W;
      const sx = wx - camera.x;
      if (sx < -10 || sx > W + 10) continue;
      ctx.fillStyle = t.flowerColors[i % t.flowerColors.length];
      const fy = gy + 4 + (i * 7) % 14;
      ctx.beginPath();
      ctx.arc(sx, fy - 3, 2, 0, Math.PI * 2);
      ctx.arc(sx - 2, fy - 1, 2, 0, Math.PI * 2);
      ctx.arc(sx + 2, fy - 1, 2, 0, Math.PI * 2);
      ctx.arc(sx, fy + 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffeb88';
      ctx.beginPath(); ctx.arc(sx, fy - 1, 1, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

// =============================================================================
// VET CLINIC
// =============================================================================
function vetRect() {
  return { x: VET.x + 20, y: groundY() - 130, w: 160, h: 130 };
}
function vetCenterX() { return VET.x + VET.w / 2; }
function helipadX() { return VET.x + VET.w - 60; }
function doorX() { const r = vetRect(); return r.x + r.w / 2; }

// Position of window slot 0..7 inside the clinic (centers, world coords).
// 4-column × 2-row grid on the front facade.
function windowCenter(slot) {
  const r = vetRect();
  const col = slot % 4;
  const row = Math.floor(slot / 4);
  return {
    x: r.x + 24 + col * 32,
    y: r.y + 30 + row * 30,
  };
}
const WINDOW_RX = 12, WINDOW_RY = 10;

function drawVet() {
  const r = vetRect();
  const hx = r.x - camera.x, hy = r.y;

  // Helipad (always drawn, even after smash)
  const padX = helipadX() - camera.x, padY = groundY() - 1;
  ctx.fillStyle = 'rgba(50,50,60,0.85)';
  ctx.beginPath();
  ctx.ellipse(padX, padY + 4, 45, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff5a8';
  ctx.font = "bold 28px 'Comic Sans MS', cursive";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('H', padX, padY - 2);
  ctx.textBaseline = 'alphabetic';

  // If destroyed, draw rubble pile and bail out before rebuilding the clinic
  if (clinicHealth <= 0) {
    drawClinicRubble(hx, hy, r);
    return;
  }

  // Tilt the building progressively as it takes damage
  const damage = 1 - clinicHealth;
  ctx.save();
  if (damage > 0) {
    ctx.translate(hx + r.w / 2, hy + r.h);
    ctx.rotate(damage * 0.18);                 // ~10° lean at full damage
    ctx.translate(-(hx + r.w / 2), -(hy + r.h));
  }

  // Main body
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(hx, hy, r.w, r.h);
  // Side shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(hx + r.w - 8, hy, 8, r.h);
  // Roof
  ctx.fillStyle = '#7ec0a4';
  ctx.beginPath();
  ctx.moveTo(hx - 6, hy);
  ctx.lineTo(hx + r.w / 2, hy - 28);
  ctx.lineTo(hx + r.w + 6, hy);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#4a7a60'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(hx - 6, hy); ctx.lineTo(hx + r.w / 2, hy - 28); ctx.lineTo(hx + r.w + 6, hy);
  ctx.stroke();
  // Sign on top of roof: paw print
  ctx.fillStyle = '#fff';
  ctx.fillRect(hx + r.w / 2 - 18, hy - 22, 36, 22);
  ctx.fillStyle = '#5a8a6a';
  // Paw pad
  const px = hx + r.w / 2, py = hy - 8;
  ctx.beginPath(); ctx.ellipse(px, py, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Toe beans
  ctx.beginPath(); ctx.arc(px - 6, py - 6, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px - 2, py - 9, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 2, py - 9, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 6, py - 6, 2.4, 0, Math.PI * 2); ctx.fill();

  // 8 round windows (4 cols × 2 rows) — one per rescued baby
  for (let slot = 0; slot < 8; slot++) {
    const w = windowCenter(slot);
    const wx = w.x - camera.x, wy = w.y;
    // Glass
    ctx.fillStyle = '#bfe2ff';
    ctx.beginPath();
    ctx.ellipse(wx, wy, WINDOW_RX, WINDOW_RY, 0, 0, Math.PI * 2);
    ctx.fill();
    // Sill shadow
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(wx - WINDOW_RX, wy + WINDOW_RY - 2, WINDOW_RX * 2, 2);
    // Baby peeking out (if a baby has been rescued into this slot)
    const baby = babies.find(b => b.healedSlot === slot && b.state === 'in_window');
    if (baby) drawBabyInWindow(baby, wx, wy);
    // Frame
    ctx.strokeStyle = '#6a8a6a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(wx, wy, WINDOW_RX, WINDOW_RY, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Door (drawn open if a baby is being collected)
  const doorOpen = mommies.some(m => m.state === 'waiting_for_baby' || m.state === 'nuzzling') ||
                   babies.some(b => b.state === 'reuniting');
  ctx.fillStyle = doorOpen ? '#3a2410' : '#a4724a';
  ctx.fillRect(hx + r.w / 2 - 14, hy + r.h - 36, 28, 36);
  if (!doorOpen) {
    ctx.fillStyle = '#7a4a2a';
    ctx.fillRect(hx + r.w / 2 - 14, hy + r.h - 36, 28, 3);
    // Doorknob
    ctx.fillStyle = '#ffd44a';
    ctx.beginPath(); ctx.arc(hx + r.w / 2 + 8, hy + r.h - 18, 1.6, 0, Math.PI * 2); ctx.fill();
  } else {
    // Open doorway — light from inside
    ctx.fillStyle = 'rgba(255,240,180,0.6)';
    ctx.fillRect(hx + r.w / 2 - 12, hy + r.h - 34, 24, 32);
  }

  // Cracks while damaged (deterministic positions so they don't flicker)
  if (damage > 0) {
    ctx.strokeStyle = 'rgba(40,40,40,0.7)'; ctx.lineWidth = 1.5;
    const numCracks = Math.floor(damage * 8);
    for (let i = 0; i < numCracks; i++) {
      const seed = i * 71 + 13;
      const x1 = hx + 6 + (seed * 17) % (r.w - 12);
      const y1 = hy + 12 + (seed * 11) % (r.h - 24);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      let cx = x1, cy = y1;
      for (let j = 1; j <= 4; j++) {
        cx += (((seed + j) * 7) % 9) - 4;
        cy += 4 + ((seed * j) % 6);
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
  }

  ctx.restore(); // end tilt transform

  // VET ZONE label (always upright, regardless of building tilt)
  ctx.save();
  ctx.font = "bold 14px 'Comic Sans MS', cursive";
  ctx.textAlign = 'center';
  ctx.fillStyle = '#3a6a4a';
  ctx.shadowColor = 'rgba(255,255,255,0.7)'; ctx.shadowBlur = 4;
  ctx.fillText('🩹 VET CLINIC 🩹', VET.x + VET.w / 2 - camera.x, groundY() - 130);
  ctx.restore();

  // Flowerbed in front of vet
  for (let i = 0; i < 6; i++) {
    const fx = hx + 8 + i * 16;
    const fy = hy + r.h + 4;
    ctx.fillStyle = ['#ff7799', '#ffd44a', '#bb88ff'][i % 3];
    ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a8a3a';
    ctx.fillRect(fx - 1, fy + 2, 2, 5);
  }
}

function drawClinicRubble(hx, hy, r) {
  // Pile of debris on the ground where the clinic used to be
  const baseY = hy + r.h;
  // Broken wall fragments
  ctx.fillStyle = '#cfcfcf';
  ctx.beginPath();
  ctx.moveTo(hx, baseY);
  ctx.lineTo(hx, baseY - 30);
  ctx.lineTo(hx + 20, baseY - 18);
  ctx.lineTo(hx + 38, baseY - 36);
  ctx.lineTo(hx + 60, baseY - 22);
  ctx.lineTo(hx + 80, baseY - 38);
  ctx.lineTo(hx + 100, baseY - 20);
  ctx.lineTo(hx + 120, baseY - 30);
  ctx.lineTo(hx + 120, baseY);
  ctx.closePath(); ctx.fill();
  // Roof shards lying about
  ctx.save();
  ctx.fillStyle = '#7ec0a4';
  ctx.translate(hx + 30, baseY - 18);
  ctx.rotate(-0.4);
  ctx.fillRect(-22, -6, 44, 8);
  ctx.restore();
  ctx.save();
  ctx.fillStyle = '#7ec0a4';
  ctx.translate(hx + 90, baseY - 14);
  ctx.rotate(0.5);
  ctx.fillRect(-18, -5, 36, 7);
  ctx.restore();
  // Door fragment
  ctx.fillStyle = '#a4724a';
  ctx.save();
  ctx.translate(hx + 70, baseY - 8);
  ctx.rotate(0.3);
  ctx.fillRect(-10, -14, 18, 14);
  ctx.restore();
  // Dust/debris specks
  ctx.fillStyle = '#8a8a8a';
  for (let i = 0; i < 14; i++) {
    const sx = hx + ((i * 17) % r.w);
    const sy = baseY - 1 - (i % 3) * 2;
    ctx.fillRect(sx, sy, 3, 3);
  }
  // Sad cross sign on the rubble
  ctx.fillStyle = '#fff';
  ctx.fillRect(hx + r.w / 2 - 14, baseY - 70, 28, 28);
  ctx.fillStyle = '#d83030';
  ctx.fillRect(hx + r.w / 2 - 4, baseY - 70, 8, 28);
  ctx.fillRect(hx + r.w / 2 - 14, baseY - 60, 28, 8);
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = "bold 14px 'Comic Sans MS', cursive";
  ctx.textAlign = 'center';
  ctx.fillText('💔', hx + r.w / 2, baseY - 80);
  ctx.restore();
}

// Draw a small baby (head + a bit of body) clipped to a round window so it
// looks like the baby is peeking out from inside the clinic.
function drawBabyInWindow(b, wx, wy) {
  ctx.save();
  // Clip to the window oval (slightly inset so the frame still shows around)
  ctx.beginPath();
  ctx.ellipse(wx, wy, WINDOW_RX - 0.5, WINDOW_RY - 0.5, 0, 0, Math.PI * 2);
  ctx.clip();
  // Position so head sits in the upper portion of the window, legs are clipped
  const bob = Math.sin(b.bobPhase) * 0.6;
  ctx.translate(wx, wy + 6 + bob);
  ctx.scale(0.55, 0.55);
  drawAnimalAt(b.species.id, false, 0, 0, {
    dir: 1, walking: false, walkPhase: 0, bobPhase: b.bobPhase,
  });
  ctx.restore();
}

// =============================================================================
// ANIMAL DRAWING — each species has a baby + mommy variant
// =============================================================================
// Distance from sprite origin (translate point) DOWN to the feet — used to
// position the origin so feet sit on the ground.
function babyHeight(speciesId) {
  switch (speciesId) {
    case 'duckling': return 11;
    case 'fawn':     return 18;
    case 'lamb':     return 15;
    case 'cub':      return 15;
    case 'kit':      return 13;
    case 'puppy':    return 13;
    case 'kitten':   return 13;
    case 'bunny':    return 12;
    default:         return 13;
  }
}
function momHeight(speciesId) {
  switch (speciesId) {
    case 'duckling': return 17;
    case 'fawn':     return 30;
    case 'lamb':     return 22;
    case 'cub':      return 23;
    case 'kit':      return 24;
    case 'puppy':    return 21;
    case 'kitten':   return 21;
    case 'bunny':    return 20;
    default:         return 21;
  }
}

// Generic helper: draw an oval (used for body/heads)
function fillEllipse(cx, cy, rx, ry) {
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
}

// Eyes: cute big pupils with a white highlight
function drawEye(cx, cy, r, lookSide = 0) {
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx + lookSide * r * 0.2, cy, r * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx + lookSide * r * 0.2 + r * 0.25, cy - r * 0.25, r * 0.25, 0, Math.PI * 2); ctx.fill();
}

// Smaller bead-eye for distant/small animals
function drawBeadEye(cx, cy, r) {
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx + r * 0.35, cy - r * 0.35, r * 0.35, 0, Math.PI * 2); ctx.fill();
}

// Smile arc
function drawSmile(cx, cy, r, color = '#5a3a2a') {
  ctx.strokeStyle = color; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0.15, Math.PI - 0.15); ctx.stroke();
}

// =============================================================================
// PUPPY (baby) + DOG (mom) — golden retriever style
// =============================================================================
function drawPuppy(opts) {
  const w = opts.walkPhase || 0;
  const legSwing = opts.walking ? Math.sin(w) * 2 : 0;
  // Legs
  ctx.fillStyle = '#d9a468';
  ctx.fillRect(-7, 6, 3, 6 + legSwing);
  ctx.fillRect(-2, 6, 3, 6 - legSwing);
  ctx.fillRect(3, 6, 3, 6 + legSwing);
  ctx.fillRect(8, 6, 3, 6 - legSwing);
  // Paws
  ctx.fillStyle = '#fff5d9';

function drawBunny(opts) {
  const w = opts.walkPhase || 0;
  // Bunnies hop, so subtle bounce
  const hop = opts.walking ? Math.abs(Math.sin(w * 0.5)) * 1.5 : 0;
  // Hind legs (folded)
  ctx.fillStyle = '#fafafa';
  fillEllipse(-5, 9 - hop, 4, 3);
  // Front legs
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(2, 5 - hop, 2, 7);
  ctx.fillRect(7, 5 - hop, 2, 7);
  // Body
  ctx.fillStyle = '#fafafa';
  fillEllipse(2, 3 - hop, 9, 6);
  // Belly highlight
  ctx.fillStyle = '#e8e8e8';
  fillEllipse(2, 6 - hop, 6, 2);
  // Tail (puff)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-7, 2 - hop, 3, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.fillStyle = '#fafafa';
  fillEllipse(9, -1 - hop, 5.5, 5);
  // Ears (long, upright, one slightly bent)
  ctx.fillStyle = '#fafafa';
  ctx.save();
  ctx.translate(7, -5 - hop);
  ctx.rotate(-0.15);
  fillEllipse(0, -5, 2, 6);
  ctx.fillStyle = '#ffc0d0';
  fillEllipse(0, -5, 1, 4);
  ctx.restore();
  ctx.save();
  ctx.translate(11, -5 - hop);
  ctx.rotate(0.25);
  ctx.fillStyle = '#fafafa';
  fillEllipse(0, -5, 2, 6);
  ctx.fillStyle = '#ffc0d0';
  fillEllipse(0, -5, 1, 4);
  ctx.restore();
  // Eyes
  drawBeadEye(7.5, -1 - hop, 1.2);
  drawBeadEye(11, -1 - hop, 1.2);
  // Nose (pink Y)
  ctx.fillStyle = '#ff8aaa';
  ctx.beginPath();
  ctx.moveTo(9.5, 1 - hop); ctx.lineTo(8.5, 1.8 - hop); ctx.lineTo(10.5, 1.8 - hop); ctx.closePath(); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#5a3a2a'; ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(9.5, 1.8 - hop); ctx.lineTo(9.5, 2.5 - hop);
  ctx.moveTo(9.5, 2.5 - hop); ctx.quadraticCurveTo(8.5, 3 - hop, 8, 2.7 - hop);
  ctx.moveTo(9.5, 2.5 - hop); ctx.quadraticCurveTo(10.5, 3 - hop, 11, 2.7 - hop);
  ctx.stroke();
  // Whiskers
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.4;
  ctx.beginPath();
  ctx.moveTo(7, 2 - hop); ctx.lineTo(4, 1.5 - hop);
  ctx.moveTo(12, 2 - hop); ctx.lineTo(15, 1.5 - hop);
  ctx.stroke();
}

// =============================================================================
function drawAnimalAt(speciesId, isMom, x, y, opts = {}) {
  ctx.save();
  ctx.translate(x, y);
  if (opts.dir === -1) ctx.scale(-1, 1);
  if (isMom) {
    switch (speciesId) {
      case 'puppy': drawDog(opts); break;
      case 'kitten': drawCat(opts); break;
      case 'bunny': drawRabbit(opts); break;
      case 'fawn': drawDeer(opts); break;
      case 'duckling': drawDuck(opts); break;
      case 'cub': drawBear(opts); break;
      case 'kit': drawFox(opts); break;
      case 'lamb': drawSheep(opts); break;
    }
  } else {
    switch (speciesId) {
      case 'puppy': drawPuppy(opts); break;
      case 'kitten': drawKitten(opts); break;
      case 'bunny': drawBunny(opts); break;
      case 'fawn': drawFawn(opts); break;
      case 'duckling': drawDuckling(opts); break;
      case 'cub': drawCub(opts); break;
      case 'kit': drawKit(opts); break;
      case 'lamb': drawLamb(opts); break;
    }
  }
  ctx.restore();
}

// =============================================================================
// OBSTACLES — trees, pines, fences, cars, boulders, snowmen
// =============================================================================
function generateObstacles(theme, babyPositions) {
  const list = [];
  // Candidate slots — gaps between babies, away from the vet zone
  const candidates = [];
  // Sort baby positions ascending
  const sorted = babyPositions.slice().sort((a, b) => a - b);
  // Add gaps between consecutive baby positions, skipping the vet zone
  for (let i = 0; i < sorted.length - 1; i++) {
    const a = sorted[i], b = sorted[i + 1];
    const gap = b - a;
    if (gap > 200) {
      // Skip if this gap straddles the vet zone
      const mid = (a + b) / 2;
      if (mid > VET.x - 80 && mid < VET.x + VET.w + 80) continue;
      candidates.push(Math.round(a + gap * 0.5));
    } else if (gap > 130) {
      candidates.push(Math.round(a + gap * 0.5));
    }
  }
  // Edge candidates (left/right of world)
  candidates.push(120);
  candidates.push(WORLD_W - 120);
  // Shuffle so themes mix
  candidates.sort(() => Math.random() - 0.5);
  // Pick obstacle types from theme mix
  const mix = theme.obstacleMix.slice().sort(() => Math.random() - 0.5);
  for (let i = 0; i < candidates.length && i < 9; i++) {
    const type = mix[i % mix.length];
    list.push(makeObstacle(type, candidates[i]));
  }
  return list;
}

function makeObstacle(type, x) {
  return { type, x, phase: Math.random() * Math.PI * 2 };
}

// AABB used for helicopter / cage collision and as a "no-spawn" hint
function obstacleCollider(o) {
  const gy = groundY();
  switch (o.type) {
    case 'tree':    return { x: o.x - 28, y: gy - 96,  w: 56, h: 96  };
    case 'pine':    return { x: o.x - 18, y: gy - 110, w: 36, h: 110 };
    case 'fence':   return { x: o.x - 40, y: gy - 22,  w: 80, h: 22  };
    case 'car':     return { x: o.x - 38, y: gy - 32,  w: 76, h: 32  };
    case 'boulder': return { x: o.x - 28, y: gy - 30,  w: 56, h: 30  };
    case 'snowman': return { x: o.x - 14, y: gy - 50,  w: 28, h: 50  };
    default:        return { x: o.x - 10, y: gy - 20,  w: 20, h: 20  };
  }
}

function drawObstacle(o) {
  const sx = o.x - camera.x;
  const gy = groundY();
  if (sx < -120 || sx > W + 120) return;
  const t = currentTheme;

  switch (o.type) {
    case 'tree': {
      // Big leafy oak/maple
      // Trunk
      ctx.fillStyle = '#5a3818';
      ctx.fillRect(sx - 6, gy - 50, 12, 50);
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(sx - 6, gy - 50, 2, 50);
      // Canopy — three overlapping fluffs
      const sway = Math.sin(o.phase + Date.now() * 0.0007) * 2;
      const leafColor = t.id === 'storm' ? '#3a5a3a' : (t.id === 'snow' ? '#5a7a4a' : '#4a8a3a');
      ctx.fillStyle = leafColor;
      ctx.beginPath(); ctx.arc(sx - 18 + sway, gy - 60, 22, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + 16 + sway, gy - 62, 24, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + sway, gy - 80, 26, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.fillStyle = t.id === 'storm' ? '#5a7a4a' : '#7ac868';
      ctx.beginPath(); ctx.arc(sx - 8 + sway, gy - 82, 8, 0, Math.PI * 2); ctx.fill();
      // Snow on top in winter

        ctx.beginPath(); ctx.arc(sx + sway, gy - 92, 12, Math.PI, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx - 14 + sway, gy - 70, 8, Math.PI, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + 14 + sway, gy - 72, 9, Math.PI, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case 'pine': {
      // Conifer — triangular tiers

      ctx.fillRect(sx - 4, gy - 22, 8, 22);

      ctx.lineTo(sx, gy - 56);
      ctx.lineTo(sx + 22, gy - 22);

      ctx.beginPath();
      ctx.moveTo(sx - 18, gy - 50);
      ctx.lineTo(sx, gy - 82);
      ctx.lineTo(sx + 18, gy - 50);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(sx - 14, gy - 78);
      ctx.lineTo(sx, gy - 110);
      ctx.lineTo(sx + 14, gy - 78);
      ctx.closePath(); ctx.fill();

        ctx.beginPath();
        ctx.moveTo(sx - 22, gy - 22); ctx.lineTo(sx - 20, gy - 26); ctx.lineTo(sx - 14, gy - 22);
        ctx.moveTo(sx + 14, gy - 22); ctx.lineTo(sx + 20, gy - 26); ctx.lineTo(sx + 22, gy - 22);
        ctx.fill();

        ctx.moveTo(sx + 8, gy - 50); ctx.lineTo(sx + 14, gy - 56); ctx.lineTo(sx + 18, gy - 50);
        ctx.fill();
        ctx.fillRect(sx - 1, gy - 112, 2, 4);
      }

    }
    case 'fence': {

      // Headlight (front, on right)

    case 'snowman': {
      const x0 = sx, y0 = gy;

      ctx.fillStyle = '#fafafa';
      ctx.beginPath(); ctx.arc(x0, y0 - 14, 14, 0, Math.PI * 2); ctx.fill();
      // Middle
      ctx.beginPath(); ctx.arc(x0, y0 - 32, 11, 0, Math.PI * 2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.arc(x0, y0 - 46, 8, 0, Math.PI * 2); ctx.fill();
      // Hat

      ctx.fillRect(x0 - 8, y0 - 52, 16, 3);
      ctx.fillRect(x0 - 5, y0 - 60, 10, 8);
      // Carrot nose
      ctx.fillStyle = '#ff8833';
      ctx.beginPath();
      ctx.moveTo(x0, y0 - 46); ctx.lineTo(x0 + 6, y0 - 46); ctx.lineTo(x0, y0 - 44); ctx.closePath();
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(x0 - 3, y0 - 48, 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0 + 3, y0 - 48, 0.8, 0, Math.PI * 2); ctx.fill();
      // Buttons
      ctx.beginPath(); ctx.arc(x0, y0 - 30, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0, y0 - 26, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0, y0 - 22, 1.2, 0, Math.PI * 2); ctx.fill();
      // Stick arms
      ctx.strokeStyle = '#5a3818'; ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(x0 - 11, y0 - 32); ctx.lineTo(x0 - 22, y0 - 38);
      ctx.moveTo(x0 + 11, y0 - 32); ctx.lineTo(x0 + 22, y0 - 38);
      ctx.stroke();
      // Smile
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(x0, y0 - 44, 2, 0.2, Math.PI - 0.2); ctx.stroke();
