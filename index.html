}

function drawObstacles() {
  for (const o of obstacles) drawObstacle(o);
}

// Soft collision: push the helicopter out of the obstacle and reverse its
// velocity. No damage — this is a kid's game.
function checkObstacleCollisions() {
  const r = heliRect();
  for (const o of obstacles) {
    const c = obstacleCollider(o);
    if (rectOverlap(r, c)) {
      const cx = c.x + c.w / 2, cy = c.y + c.h / 2;
      let dx = heli.x - cx, dy = heli.y - cy;
      const d = Math.hypot(dx, dy) || 1;
      // Push heli out of overlap
      heli.x += (dx / d) * 5;
      heli.y += (dy / d) * 4;
      // Bounce velocity (gentle)
      heli.vx = (dx / d) * 3.5;
      heli.vy = (dy / d) * 3.0 - 0.5;
      // Tiny visual puff
      for (let i = 0; i < 4; i++) {
        spawnParticle({
          x: heli.x, y: heli.y,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          gravity: 0.05, life: 1, decay: 0.05,
          size: 2, color: 'rgba(255,255,255,0.6)', shape: 'circle',
        });
      }
      break; // one collision per frame
    }
  }
}

// Make the cage rest on top of an obstacle when it lands on one
function settleCageOnObstacles() {
  for (const o of obstacles) {
    const c = obstacleCollider(o);
    if (cage.x > c.x - 4 && cage.x < c.x + c.w + 4) {
      const top = c.y - CAGE_H;
      if (cage.y > top) cage.y = top;
    }
  }
}

// =============================================================================
// WEATHER PARTICLES (rain / snow / leaves) + lightning
// =============================================================================
function spawnWeatherParticle() {
  const t = currentTheme;
  if (!t.weather) return;
  const x = camera.x + Math.random() * W;
  if (t.weather === 'rain') {
    weatherParticles.push({
      type: 'rain', x, y: -10,
      vx: -1.4, vy: 14 + Math.random() * 4,
      life: 1,
    });
  } else if (t.weather === 'snow') {
    weatherParticles.push({
      type: 'snow', x, y: -10,
      vx: (Math.random() - 0.5) * 0.6, vy: 0.8 + Math.random() * 0.8,
      phase: Math.random() * Math.PI * 2,
      r: 1.5 + Math.random() * 1.5,
      life: 1,
    });
  } else if (t.weather === 'leaves') {
    weatherParticles.push({
      type: 'leaf', x, y: -10,
      vx: -0.5 - Math.random(), vy: 0.6 + Math.random(),
      phase: Math.random() * Math.PI * 2,
      color: ['#d8642a', '#f0a830', '#aa3838', '#dca068'][Math.floor(Math.random() * 4)],
      life: 1,
    });
  }
}
function updateWeather() {
  const t = currentTheme;
  if (t.weather) {
    const rate = t.weather === 'rain' ? 6 : (t.weather === 'snow' ? 3 : 1);
    for (let i = 0; i < rate; i++) spawnWeatherParticle();
  }
  for (const p of weatherParticles) {
    if (p.type === 'rain') {
      p.x += p.vx; p.y += p.vy;
      if (p.y > H + 20) p.life = 0;
    } else if (p.type === 'snow') {
      p.phase += 0.04;
      p.x += p.vx + Math.sin(p.phase) * 0.6;
      p.y += p.vy;
      if (p.y > H + 20) p.life = 0;
    } else if (p.type === 'leaf') {
      p.phase += 0.08;
      p.x += p.vx + Math.sin(p.phase) * 1.2;
      p.y += p.vy;
      if (p.y > H + 20) p.life = 0;
    }
  }
  weatherParticles = weatherParticles.filter(p => p.life > 0);

  // Lightning on storm theme
  if (t.id === 'storm') {
    if (lightningFlash > 0) lightningFlash--;
    if (Math.random() < 0.0025) {
      lightningFlash = 8;
      // Quiet rumble — re-use playRumble-ish
      const at = audioCtx.currentTime;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.07, at); g.gain.exponentialRampToValueAtTime(0.0001, at + 0.6);
      const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 250;
      src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(at);
    }
  }
}
function drawWeather() {
  for (const p of weatherParticles) {
    const sx = p.x - camera.x;
    if (sx < -20 || sx > W + 20) continue;
    if (p.type === 'rain') {
      ctx.strokeStyle = 'rgba(180,210,240,0.7)'; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(sx, p.y);
      ctx.lineTo(sx + p.vx, p.y - p.vy);
      ctx.stroke();
    } else if (p.type === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(sx, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'leaf') {
      ctx.save();
      ctx.translate(sx, p.y);
      ctx.rotate(p.phase);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 4, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

// =============================================================================
// DINOSAUR — slow T-Rex that eats injured babies and smashes the clinic
// =============================================================================
function makeDino(fromLeft) {
  return {
    x: fromLeft ? -150 : WORLD_W + 150,
    y: groundY(),
    dir: fromLeft ? 1 : -1,
    speed: 0.42,
    state: 'walking',  // walking | eating | smashing | done
    walkPhase: 0,
    eatingTimer: 0,
    eatingBaby: null,
    smashTimer: 0,
    spawnDelay: 90,    // grace period before any movement
    stepTimer: 0,
    fromLeft,
  };
}

function dinoBody() {
  // Approximate body box (in WORLD coords) — used for drawing-bounds & UI arrows
  return { x: dino.x - 50, y: dino.y - 90, w: 100, h: 90 };
}

function updateDino() {
  if (!dino || gameState !== 'playing') return;
  if (dino.spawnDelay > 0) { dino.spawnDelay--; return; }

  // Helper: are there any babies left for the dino to threaten?
  const anyInjured = babies.some(b => b.state === 'injured' || b.state === 'being_eaten');

  if (dino.state === 'walking') {
    // Retreat if there's nothing left to threaten — player saved them all
    if (!anyInjured && rescuedCount + eatenCount === SPECIES.length) {
      const retreatX = dino.fromLeft ? -200 : WORLD_W + 200;
      const dx = retreatX - dino.x;
      if (Math.abs(dx) < 10) { dino.state = 'done'; return; }
      dino.dir = Math.sign(dx);
      dino.x += dino.dir * 4.0;            // brisk retreat — danger is over
      dino.walkPhase += 0.32;
      dino.stepTimer++;
      if (dino.stepTimer > 14) {
        dino.stepTimer = 0;
        const onScreen = dino.x > camera.x - 100 && dino.x < camera.x + W + 100;
        if (onScreen) playFootstep();
      }
      return;
    }

    // Find nearest INJURED baby in our walking direction
    let targetBaby = null, nearestDist = Infinity;
    for (const b of babies) {
      if (b.state !== 'injured') continue;
      const dx = b.x - dino.x;
      if (Math.sign(dx) !== dino.dir && Math.abs(dx) > 30) continue;
      const dist = Math.abs(dx);
      if (dist < nearestDist) { nearestDist = dist; targetBaby = b; }
    }

    let targetX;
    if (targetBaby) {
      targetX = targetBaby.x;
    } else {
      // No injured babies in path → head to the clinic (stop at the side it
      // came in from so the dino lands beside the building, not on top of it)
      const vr = vetRect();
      targetX = dino.fromLeft ? (vr.x - 30) : (vr.x + vr.w + 30);
    }

    const dx = targetX - dino.x;

    if (targetBaby && Math.abs(dx) < 26) {
      dino.state = 'eating';
      dino.eatingTimer = 90;
      dino.eatingBaby = targetBaby;
      targetBaby.state = 'being_eaten';
      playRoar();
    } else if (!targetBaby && Math.abs(dx) < 12) {
      dino.state = 'smashing';
      dino.smashTimer = 240;          // 4 seconds — enough warning to rush
      playRoar();
    } else {
      dino.dir = Math.sign(dx) || dino.dir;
      dino.x += dino.dir * dino.speed;
      dino.walkPhase += 0.1;
      dino.stepTimer++;
      if (dino.stepTimer > 50) {
        dino.stepTimer = 0;
        const onScreen = dino.x > camera.x - 100 && dino.x < camera.x + W + 100;
        if (onScreen) { playFootstep(); screenShake = Math.max(screenShake, 3); }
      }
    }
  } else if (dino.state === 'eating') {
    dino.eatingTimer--;
    // Crunch sound near end of chomp
    if (dino.eatingTimer === 60 || dino.eatingTimer === 30) playCrunch();
    // Tooth/munch particles
    if (Math.random() < 0.3) {
      spawnParticle({
        x: dino.x + dino.dir * 30, y: dino.y - 60,
        vx: (Math.random() - 0.5) * 2,
        vy: -1 - Math.random(),
        gravity: 0.05, life: 1, decay: 0.04,
        size: 2 + Math.random() * 2,
        color: ['#fff', '#ff8aaa', '#ffd44a'][Math.floor(Math.random()*3)],
        shape: 'circle',
      });
    }
    if (dino.eatingTimer <= 0) {
      const b = dino.eatingBaby;
      if (b) {
        babies = babies.filter(x => x.id !== b.id);
        eatenCount++;
        floats.push(new FloatText(dino.x, dino.y - 96, '😢 ' + b.species.babyName, '#ff5566'));
        for (let i = 0; i < 8; i++) {
          spawnParticle({
            x: dino.x + 30 * dino.dir, y: dino.y - 60,
            vx: (Math.random() - 0.5) * 2 + dino.dir * 0.5,
            vy: -1 - Math.random(),
            gravity: -0.02, life: 1, decay: 0.025,
            size: 3, color: 'rgba(180,180,180,0.5)', shape: 'circle',
          });
        }
      }
      dino.eatingBaby = null;
      dino.state = 'walking';
    }
  } else if (dino.state === 'smashing') {
    // Player rescues last baby mid-smash → dino bails (clinic stays partially damaged)
    if (!anyInjured && rescuedCount + eatenCount === SPECIES.length) {
      dino.state = 'walking';
      return;
    }
    dino.smashTimer--;
    clinicHealth = Math.max(0, dino.smashTimer / 240);
    screenShake = 8;
    // Rubble + dust
    if (Math.random() < 0.5) {
      spawnParticle({
        x: vetCenterX() + (Math.random() - 0.5) * 100,
        y: groundY() - 80 - Math.random() * 30,
        vx: (Math.random() - 0.5) * 5,
        vy: -2 - Math.random() * 4,
        gravity: 0.18, life: 1, decay: 0.018,
        size: 3 + Math.random() * 3,
        color: ['#aaa', '#888', '#c8a868'][Math.floor(Math.random()*3)],
        shape: 'circle',
      });
    }
    // Crunch sounds during smashing
    if (dino.smashTimer % 30 === 0) playCrunch();
    if (dino.smashTimer <= 0) {
      clinicHealth = 0;
      gameState = 'gameover';
      stateTimer = 0;
      dino.state = 'done';
      playSadSound();
    }
  }
}

function drawDinosaur(d) {
  const sx = d.x - camera.x;
  if (sx < -180 || sx > W + 180) return;
  const sy = d.y;
  const dir = d.dir > 0 ? 1 : -1;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(dir, 1);

  const walking = (d.state === 'walking' && d.spawnDelay === 0);
  const bob = walking ? Math.abs(Math.sin(d.walkPhase)) * 2 : 0;
  const legSwing = walking ? Math.sin(d.walkPhase) * 7 : 0;
  // Smashing — body lurches forward
  const smashLunge = (d.state === 'smashing') ? Math.sin(d.smashTimer * 0.2) * 6 : 0;

  // === TAIL (behind body) ===
  ctx.fillStyle = '#3a6840';
  ctx.beginPath();
  ctx.moveTo(-20, -42);
  ctx.bezierCurveTo(-50, -55, -78, -45, -90, -18);
  ctx.lineTo(-84, -12);
  ctx.bezierCurveTo(-60, -28, -40, -32, -20, -32);
  ctx.closePath();
  ctx.fill();
  // Tail spikes
  ctx.fillStyle = '#2a5028';
  for (let i = 0; i < 5; i++) {
    const t = 0.15 + i * 0.18;
    const px = -20 + (-90 - (-20)) * t;
    const py = -42 + Math.pow(t, 0.6) * 22 - 8;
    ctx.beginPath();
    ctx.moveTo(px - 3, py + 3);
    ctx.lineTo(px - 1, py - 5);
    ctx.lineTo(px + 3, py + 2);
    ctx.closePath();
    ctx.fill();
  }

  // === BACK LEG ===
  ctx.fillStyle = '#3a6840';
  // thigh
  ctx.beginPath();
  ctx.ellipse(-12 - legSwing * 0.3, -28, 12, 16, 0, 0, Math.PI * 2);
  ctx.fill();
  // shin
  ctx.beginPath();
  ctx.ellipse(-14 - legSwing, -14, 7, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // foot
  ctx.fillStyle = '#2a5028';
  ctx.fillRect(-22 - legSwing, -5, 18, 5);
  // claws
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 3; i++) {
    const cx = -22 - legSwing + i * 6;
    ctx.beginPath();
    ctx.moveTo(cx, -5); ctx.lineTo(cx + 2, 0); ctx.lineTo(cx + 4, -5);
    ctx.closePath(); ctx.fill();
  }

  // === BODY ===
  ctx.fillStyle = '#4a7848';
  ctx.beginPath();
  ctx.ellipse(0 + smashLunge, -50 + bob, 36, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Belly
  ctx.fillStyle = '#a8c068';
  ctx.beginPath();
  ctx.ellipse(0 + smashLunge, -42 + bob, 26, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Back stripes / scales
  ctx.fillStyle = '#2a5028';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse(-20 + i * 10 + smashLunge, -68 + bob, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // === FRONT LEG ===
  ctx.fillStyle = '#4a7848';
  ctx.beginPath();
  ctx.ellipse(15 + legSwing * 0.3, -28, 12, 16, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(13 + legSwing, -14, 7, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2a5028';
  ctx.fillRect(7 + legSwing, -5, 18, 5);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 3; i++) {
    const cx = 7 + legSwing + i * 6;
    ctx.beginPath();
    ctx.moveTo(cx, -5); ctx.lineTo(cx + 2, 0); ctx.lineTo(cx + 4, -5);
    ctx.closePath(); ctx.fill();
  }

  // === TINY ARM ===
  ctx.fillStyle = '#3a6840';
  ctx.fillRect(13 + smashLunge, -50 + bob, 4, 9);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(15 + smashLunge, -41 + bob, 2, 0, Math.PI * 2); ctx.fill();

  // === HEAD ===
  const jawDrop = (d.state === 'eating') ? Math.abs(Math.sin(d.eatingTimer * 0.4)) * 7 : 0;
  const headX = 40 + smashLunge;
  const headY = -65 + bob;
  ctx.fillStyle = '#4a7848';
  ctx.beginPath();
  ctx.ellipse(headX, headY, 26, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Snout (lighter)
  ctx.fillStyle = '#5a8a58';
  ctx.beginPath();
  ctx.ellipse(headX + 16, headY + 4, 14, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth interior (open)
  ctx.fillStyle = '#3a0808';
  ctx.beginPath();
  ctx.moveTo(headX - 6, headY + 7);
  ctx.lineTo(headX + 28, headY + 7);
  ctx.lineTo(headX + 28, headY + 11 + jawDrop);
  ctx.lineTo(headX - 6, headY + 9 + jawDrop * 0.4);
  ctx.closePath(); ctx.fill();
  // Tongue
  if (jawDrop > 1) {
    ctx.fillStyle = '#d83a5a';
    ctx.beginPath();
    ctx.ellipse(headX + 8, headY + 9 + jawDrop * 0.6, 8, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Lower jaw
  ctx.fillStyle = '#3a6840';
  ctx.beginPath();
  ctx.ellipse(headX + 8, headY + 11 + jawDrop, 18, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Top teeth
  ctx.fillStyle = '#fff5e0';
  for (let i = 0; i < 6; i++) {
    const tx = headX - 5 + i * 5.5;
    ctx.beginPath();
    ctx.moveTo(tx - 1.5, headY + 7);
    ctx.lineTo(tx, headY + 11);
    ctx.lineTo(tx + 1.5, headY + 7);
    ctx.closePath(); ctx.fill();
  }
  // Bottom teeth
  for (let i = 0; i < 5; i++) {
    const tx = headX - 4 + i * 5.5;
    ctx.beginPath();
    ctx.moveTo(tx - 1.5, headY + 11 + jawDrop);
    ctx.lineTo(tx, headY + 7 + jawDrop);
    ctx.lineTo(tx + 1.5, headY + 11 + jawDrop);
    ctx.closePath(); ctx.fill();
  }

  // Eye (yellow with red pupil — angry)
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath(); ctx.arc(headX + 1, headY - 6, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#a83030';
  ctx.beginPath(); ctx.arc(headX + 3, headY - 6, 2.6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(headX + 3, headY - 6, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(headX + 4, headY - 7, 0.6, 0, Math.PI * 2); ctx.fill();

  // Angry brow
  ctx.strokeStyle = '#3a3000'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(headX - 6, headY - 14);
  ctx.lineTo(headX + 8, headY - 9);
  ctx.stroke();

  // Nostrils
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(headX + 26, headY + 1, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headX + 26, headY + 5, 1.0, 0, Math.PI * 2); ctx.fill();

  // === BABY BEING EATEN (visible in jaws briefly) ===
  if (d.state === 'eating' && d.eatingBaby) {
    const phase = (90 - d.eatingTimer) / 90; // 0..1
    if (phase < 0.6) {
      const liftY = headY + 10 - phase * 12;
      const wobble = Math.sin(d.eatingTimer * 0.5) * 1.5;
      ctx.save();
      ctx.translate(headX + 8, liftY + wobble);
      ctx.scale(0.55 * (1 - phase * 0.4), 0.55 * (1 - phase * 0.4));
      drawAnimalAt(d.eatingBaby.species.id, false, 0, 0, { dir: dino.dir > 0 ? -1 : 1 });
      ctx.restore();
    }
  }

  ctx.restore();

  // Off-baseline shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 2, 50, 6, 0, 0, Math.PI * 2);
  ctx.fill();
}

// =============================================================================
// HELICOPTER
// =============================================================================
function drawHelicopter() {
  const hx = heli.x - camera.x;
  const hy = heli.y + Math.sin(heli.bobPhase) * 1.5;

  ctx.save();
  ctx.translate(hx, hy);
  ctx.scale(heli.dir, 1);

  // Tail boom
  ctx.fillStyle = '#5a8a6a';
  ctx.beginPath();
  ctx.moveTo(-10, -2); ctx.lineTo(-44, -4); ctx.lineTo(-44, 2); ctx.lineTo(-10, 4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a6a4a';
  ctx.beginPath();
  ctx.moveTo(-44, -4); ctx.lineTo(-50, -14); ctx.lineTo(-40, -4);
  ctx.closePath(); ctx.fill();
  // Tail rotor
  heli.tailRotorPhase += 0.9;
  ctx.save();
  ctx.translate(-46, 0);
  ctx.rotate(heli.tailRotorPhase);
  ctx.fillStyle = 'rgba(40,40,40,0.85)';
  ctx.fillRect(-10, -1, 20, 2); ctx.fillRect(-1, -10, 2, 20);
  ctx.restore();

  // Body — green rescue color (matches vet roof)
  ctx.fillStyle = '#7ec0a4';
  ctx.beginPath();
  ctx.moveTo(-12, -10); ctx.lineTo(20, -10);
  ctx.quadraticCurveTo(34, -8, 32, 4);
  ctx.lineTo(32, 6); ctx.lineTo(-12, 10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#bfe2ff';
  ctx.beginPath();
  ctx.moveTo(14, -8); ctx.lineTo(28, -6);
  ctx.quadraticCurveTo(32, -2, 30, 4);
  ctx.lineTo(14, 4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fafafa'; ctx.fillRect(-12, -2, 28, 3);
  // Paw print logo
  ctx.fillStyle = '#fff';
  ctx.fillRect(2, -7, 8, 8);
  ctx.fillStyle = '#5a8a6a';
  ctx.beginPath(); ctx.ellipse(6, -2, 1.6, 1.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -4, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.5, -5, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.5, -5, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -4, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
  ctx.strokeRect(-10, -8, 12, 16);
  // Skids
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-10, 12); ctx.lineTo(20, 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6, 10); ctx.lineTo(-8, 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, 10); ctx.lineTo(18, 12); ctx.stroke();
  // Winch
  ctx.fillStyle = '#888'; ctx.fillRect(0, 8, 6, 4);
  // Main rotor
  heli.rotorPhase += 1.1;
  ctx.save();
  ctx.translate(8, -12);
  ctx.fillStyle = '#444'; ctx.fillRect(-1, 0, 2, 4);
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(0, -1, 36, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.rotate(heli.rotorPhase);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-36, -1, 72, 2);
  ctx.restore();
  ctx.restore();

  ctx.restore();

  // Down-wash
  if (heli.y > groundY() - 220 && Math.random() < 0.4) {
    spawnParticle({
      x: heli.x + (Math.random() - 0.5) * 50,
      y: heli.y + 12,
      vx: (Math.random() - 0.5) * 3, vy: 1 + Math.random() * 2,
      gravity: 0.05, life: 1, decay: 0.04,
      size: 2 + Math.random() * 2,
      color: 'rgba(220,220,220,0.4)', shape: 'circle',
    });
  }
}

function heliRect() {
  return { x: heli.x - HELI_W / 2, y: heli.y - HELI_H / 2, w: HELI_W, h: HELI_H };
}

function updateHelicopter() {
  const cageDown = cage.cableLength > 4;
  let ax = 0, ay = 0;
  if (!cageDown) {
    if (isLeft())  ax -= 1;
    if (isRight()) ax += 1;
    if (isUp())    ay -= 1;
    if (isDown())  ay += 1;
    if (ax !== 0 && ay !== 0) { ax *= 0.707; ay *= 0.707; }
  }

  if (cageDown) {
    heli.vx *= 0.7;
    heli.vy *= 0.7;
    if (Math.abs(heli.vx) < 0.05) heli.vx = 0;
    if (Math.abs(heli.vy) < 0.05) heli.vy = 0;
  } else {
    heli.vx += (ax * HELI_SPEED - heli.vx) * 0.12;
    heli.vy += (ay * HELI_SPEED - heli.vy) * 0.15;
    if (Math.abs(heli.vx) < 0.05) heli.vx = 0;
    if (Math.abs(heli.vy) < 0.05) heli.vy = 0;
  }

  heli.x += heli.vx;
  heli.y += heli.vy;

  if (heli.vx > 0.5) heli.dir = 1;
  else if (heli.vx < -0.5) heli.dir = -1;

  const minY = 30;
  const maxY = groundY() - 30;
  heli.x = Math.max(20, Math.min(WORLD_W - 20, heli.x));
  heli.y = Math.max(minY, Math.min(maxY, heli.y));

  heli.bobPhase += 0.15;
  const intensity = 0.04 + Math.min(0.05, (Math.abs(heli.vx) + Math.abs(heli.vy)) * 0.01);
  setRotorVolume(intensity);

  checkObstacleCollisions();

  // Hard clamp again after collision push so heli doesn't escape the world
  heli.x = Math.max(20, Math.min(WORLD_W - 20, heli.x));
  heli.y = Math.max(minY, Math.min(maxY, heli.y));
}

// =============================================================================
// CAGE
// =============================================================================
function drawCageAndCable() {
  const ax = heli.x;
  const ay = heli.y + 12;
  const cx = cage.x;
  const cy = cage.y;
  ctx.save();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ax - camera.x, ay);
  ctx.lineTo(cx - camera.x, cy);
  ctx.stroke();
  ctx.restore();

  if (cage.cableLength < 4) return;

  ctx.save();
  ctx.translate(cx - camera.x, cy);
  // Hook
  ctx.fillStyle = '#888'; ctx.fillRect(-3, -4, 6, 4);
  // Soft basket: warmer color, padded look
  ctx.fillStyle = '#f0c870';
  ctx.fillRect(-CAGE_W / 2, 0, CAGE_W, CAGE_H);
  ctx.fillStyle = '#b88a18';
  ctx.fillRect(-CAGE_W / 2, 0, CAGE_W, 3);
  ctx.fillRect(-CAGE_W / 2, CAGE_H - 3, CAGE_W, 3);
  // Soft pillow inside
  ctx.fillStyle = '#ffe8c0';
  ctx.fillRect(-CAGE_W / 2 + 4, 4, CAGE_W - 8, CAGE_H - 8);
  // Bars (lighter — friendly)
  ctx.strokeStyle = '#d8a838'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const xx = -CAGE_W / 2 + 4 + i * (CAGE_W - 8) / 4;
    ctx.beginPath();
    ctx.moveTo(xx, 3); ctx.lineTo(xx, CAGE_H - 3);
    ctx.stroke();
  }

  // Passenger inside
  if (cage.passenger) {
    const p = cage.passenger;
    ctx.save();
    ctx.translate(0, CAGE_H - 8);
    ctx.scale(0.7, 0.7);
    drawAnimalAt(p.species.id, false, 0, 0, { dir: 1 });
    ctx.restore();
  }

  // Open indicator
  const onSomething = cageRestingOnSurface();
  if (onSomething && !cage.passenger) {
    ctx.font = "bold 18px 'Comic Sans MS', cursive";
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.01);
    ctx.fillStyle = `rgba(255,240,140,${pulse})`;
    ctx.shadowColor = '#ffaa33'; ctx.shadowBlur = 8;
    ctx.textAlign = 'center';
    ctx.fillText('↓', 0, -8);
  }
  ctx.restore();
}

function cageRestingOnSurface() {
  return cage.cableLength > 4 && cage.y + CAGE_H >= groundY() - 1;
}

function cageInVet() {
  return cage.x > VET.x && cage.x < VET.x + VET.w;
}

function updateCage() {
  if (isCage()) {
    cage.cableLength = Math.min(CABLE_MAX, cage.cableLength + CABLE_SPEED);
    if (Math.random() < 0.15) playWinch();
  } else {
    cage.cableLength = Math.max(0, cage.cableLength - CABLE_SPEED * 1.4);
  }

  const targetAngle = Math.atan(-heli.vx / 22);
  cage.angVel += (targetAngle - cage.angle) * 0.05;
  cage.angVel *= 0.92;
  cage.angle += cage.angVel;
  cage.angle = Math.max(-0.6, Math.min(0.6, cage.angle));

  const ax = heli.x, ay = heli.y + 12;
  cage.x = ax + Math.sin(cage.angle) * cage.cableLength;
  cage.y = ay + Math.cos(cage.angle) * cage.cableLength;

  // Cage rests on ground
  const groundTopY = groundY() - CAGE_H;
  if (cage.y > groundTopY) {
    cage.y = groundTopY;
    cage.x = ax + Math.sin(cage.angle) * Math.max(0, cage.y - ay);
  }

  // Cage rests on top of obstacles (boulders, fences, cars, etc.)
  settleCageOnObstacles();

  // Auto-deliver in vet zone
  if (cage.passenger && cageRestingOnSurface() && cageInVet()) {
    const b = cage.passenger;
    cage.passenger = null;
    b.state = 'healing';
    b.healTimer = 120;             // 2-second healing animation in front of door
    b.healedSlot = rescuedCount;
    b.x = doorX();
    b.y = groundY() - babyHeight(b.species.id);
    b.dir = 1;
    rescuedCount++;
    floats.push(new FloatText(b.x, b.y - 30, '+ ' + b.species.babyName + '!', '#7eff9e'));
    playHeal();
    // Sparkle burst on arrival
    for (let i = 0; i < 12; i++) {
      spawnParticle({
        x: b.x + (Math.random() - 0.5) * 10,
        y: b.y - 6 + (Math.random() - 0.5) * 12,
        vx: (Math.random() - 0.5) * 2,
        vy: -1 - Math.random() * 1.5,
        gravity: -0.02, life: 1, decay: 0.03,
        size: 3, color: ['#ff99dd', '#ffd44a', '#aaffaa'][i % 3], shape: 'star',
      });
    }
  }
}

// =============================================================================
// BABY UPDATES (boarding cage, healing, reuniting, leaving)
// =============================================================================
function updateBabies() {
  for (const b of babies) {
    b.bobPhase += 0.08;
    if (b.state === 'injured') {
      b.sparklePhase += 0.05;
      // Walk toward cage if it's close and on ground
      if (!cage.passenger && cageRestingOnSurface() && !cageInVet()) {
        const dx = cage.x - b.x;
        if (Math.abs(dx) < PICKUP_RADIUS) {
          b.state = 'boarding';
          b.targetX = cage.x;
          b.dir = dx > 0 ? 1 : -1;
        }
      }
    } else if (b.state === 'boarding') {
      // If cage left, revert
      if (!cageRestingOnSurface() || cage.passenger || cageInVet()) {
        b.state = 'injured';
        continue;
      }
      b.targetX = cage.x;
      const dx = b.targetX - b.x;
      if (Math.abs(dx) > 1) {
        b.x += Math.sign(dx) * Math.min(Math.abs(dx), ANIMAL_WALK_SPEED);
        b.dir = dx > 0 ? 1 : -1;
        b.walkPhase += 0.3;
      } else if (!cage.passenger) {
        b.state = 'in_cage';
        cage.passenger = b;
        playPickup();
        floats.push(new FloatText(cage.x, cage.y - 6, 'In!', '#ffd44a'));
      } else {
        b.state = 'injured';
      }
    } else if (b.state === 'healing') {
      b.healTimer--;
      // Sparkle particles around healing animal
      if (Math.random() < 0.4) {
        spawnParticle({
          x: b.x + (Math.random() - 0.5) * 20,
          y: b.y - babyHeight(b.species.id) / 2 + (Math.random() - 0.5) * 16,
          vx: (Math.random() - 0.5) * 0.8,
          vy: -0.5 - Math.random(),
          gravity: -0.01, life: 1, decay: 0.03,
          size: 2.5, color: '#ffe888', shape: 'star',
        });
      }
      if (b.healTimer <= 0) {
        // Baby is healed → goes inside the clinic to its window slot
        b.state = 'in_window';
        playSparkle();
        // Sparkle at door (where they were standing) and at window (where they appear)
        const w = windowCenter(b.healedSlot);
        for (let i = 0; i < 8; i++) {
          spawnParticle({
            x: b.x, y: b.y - 10,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3 - 1,
            gravity: -0.02, life: 1, decay: 0.025,
            size: 3, color: '#aaffaa', shape: 'star',
          });
          spawnParticle({
            x: w.x, y: w.y,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            gravity: 0, life: 1, decay: 0.03,
            size: 2.5, color: '#ffe888', shape: 'star',
          });
        }
        // Move baby to its window slot (drawing at window is handled in drawVet)
        b.x = w.x;
        b.y = w.y;
      }
    } else if (b.state === 'leaving') {
      // Walk with mommy
      if (b.mommy) {
        b.x = b.mommy.x + b.mommy.dir * 14;
        b.dir = b.mommy.dir;
        b.walkPhase += 0.3;
      }
    }
  }
}

// =============================================================================
// MOMMY UPDATES
// =============================================================================
// Spawn the next mommy in line — only one is active at the door at a time.
// The first eligible baby in 'in_window' state is the one collected.
function spawnNextMommy() {
  const next = babies.find(b => b.state === 'in_window');
  if (!next) return false;
  const fromLeft = (next.healedSlot % 2 === 0);
  const mom = makeMommy(next.species.id, fromLeft, next);
  mom.state = 'walking_to_door';
  mommies.push(mom);
  next.mommy = mom;
  return true;
}

function updateMommies() {
  for (const m of mommies) {
    m.bobPhase += 0.08;
    if (m.state === 'walking_to_door') {
      // Walk to a position just beside the door (on the side the mom came from)
      const stopX = doorX() + (m.fromLeft ? -28 : 28);
      const dx = stopX - m.x;
      m.dir = Math.sign(dx) || (m.fromLeft ? 1 : -1);
      const speed = 3.0;
      if (Math.abs(dx) > 4) {
        m.x += m.dir * speed;
        m.walkPhase += 0.28;
      } else {
        // Arrived at door — wait briefly while baby comes out
        m.state = 'waiting_for_baby';
        m.waitTimer = 30;
        // Face the door (toward the centerline)
        m.dir = m.fromLeft ? 1 : -1;
        playSparkle();
      }
    } else if (m.state === 'waiting_for_baby') {
      m.waitTimer--;
      if (m.waitTimer <= 0) {
        // Baby steps out of the door
        const b = m.babyRef;
        b.state = 'reuniting';
        b.x = doorX() + (m.fromLeft ? 14 : -14); // baby steps out toward mom
        b.y = groundY() - babyHeight(b.species.id);
        b.dir = m.fromLeft ? -1 : 1;             // baby faces mom
        // Sparkle at the empty window
        const w = windowCenter(b.healedSlot);
        for (let i = 0; i < 6; i++) {
          spawnParticle({
            x: w.x, y: w.y,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -0.5 - Math.random(),
            gravity: 0, life: 1, decay: 0.04,
            size: 2, color: '#ffe888', shape: 'star',
          });
        }
        // Burst of hearts at the door
        for (let i = 0; i < 10; i++) {
          spawnParticle({
            x: doorX() + (Math.random() - 0.5) * 24,
            y: m.y - 20 + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -1 - Math.random() * 1.5,
            gravity: -0.02, life: 1, decay: 0.018,
            size: 4, color: '#ff77aa', shape: 'heart',
          });
        }
        m.state = 'nuzzling';
        m.nuzzleTimer = 60;
      }
    } else if (m.state === 'nuzzling') {
      m.nuzzleTimer--;
      if (Math.random() < 0.3) {
        spawnParticle({
          x: m.x + (Math.random() - 0.5) * 16,
          y: m.y - 20,
          vx: (Math.random() - 0.5) * 1,
          vy: -0.8 - Math.random(),
          gravity: -0.02, life: 1, decay: 0.02,
          size: 3, color: '#ff77aa', shape: 'heart',
        });
      }
      if (m.nuzzleTimer <= 0) {
        m.state = 'leaving';
        m.dir = m.fromLeft ? -1 : 1;
        m.babyRef.state = 'leaving';
        m.babyRef.dir = m.dir;
        m.leavingFrames = 110;
        // Queue the next mommy now so she's walking in while this one leaves
        spawnNextMommy();
      }
    } else if (m.state === 'leaving') {
      const speed = 2.0;
      m.x += m.dir * speed;
      m.walkPhase += 0.22;
      m.leavingFrames--;
      if (m.leavingFrames <= 0) {
        // Final sparkle of hearts as the family heads home
        for (let i = 0; i < 12; i++) {
          spawnParticle({
            x: m.x + (Math.random() - 0.5) * 24,
            y: m.y - 16 + (Math.random() - 0.5) * 16,
            vx: (Math.random() - 0.5) * 2,
            vy: -1 - Math.random() * 1.5,
            gravity: -0.02, life: 1, decay: 0.02,
            size: 4, color: '#ff77aa', shape: 'heart',
          });
        }
        m.state = 'gone';
        m.babyRef.state = 'gone';
      }
    }
  }
}

// =============================================================================
// DRAWING ANIMALS IN THE WORLD
// =============================================================================
function drawBaby(b) {
  if (b.state === 'in_cage' || b.state === 'gone' || b.state === 'in_window') return;
  const sx = b.x - camera.x;
  // 'reuniting' = standing still next to mom — only animate legs while actually walking
  const animate = (b.state === 'boarding' || b.state === 'leaving');
  // Healing baby gets a soft glow
  if (b.state === 'healing') {
    ctx.save();
    const pulse = 0.4 + 0.3 * Math.sin(Date.now() * 0.008);
    ctx.fillStyle = `rgba(170, 230, 170, ${pulse})`;
    ctx.beginPath();
    ctx.arc(sx, b.y - babyHeight(b.species.id) / 2, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Bandage on injured
  if (b.state === 'injured') {
    drawBandage(sx, b.y - babyHeight(b.species.id) / 2 - 8, b);
  }

  drawAnimalAt(b.species.id, false, sx, b.y, {
    walkPhase: b.walkPhase,
    walking: animate,
    bobPhase: b.bobPhase,
    dir: b.dir,
  });

  // Name tag above injured babies
  if (b.state === 'injured') {
    const wob = Math.sin(b.sparklePhase * 2) * 1.5;
    ctx.save();
    ctx.font = "bold 11px 'Comic Sans MS', cursive";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 3;
    ctx.fillText(b.species.babyName, sx, b.y - babyHeight(b.species.id) - 8 + wob);
    ctx.restore();
  }
}

function drawBandage(cx, cy, b) {
  // Tan plus-sign bandage on top of baby
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(0.4);
  ctx.fillStyle = '#f0d09a';
  ctx.fillRect(-5, -2, 10, 4);
  ctx.fillStyle = '#d8a868';
  ctx.fillRect(-5, -2, 10, 1);
  ctx.fillRect(-5, 1, 10, 1);
  // Dots on bandage
  ctx.fillStyle = '#a87030';
  ctx.fillRect(-3, -0.5, 0.6, 1);
  ctx.fillRect(2, -0.5, 0.6, 1);
  ctx.restore();
}

function drawMommy(m) {
  if (m.state === 'gone' || m.state === 'waiting') return;
  const sx = m.x - camera.x;
  const animate = (m.state === 'walking_to_baby' || m.state === 'leaving');
  drawAnimalAt(m.speciesId, true, sx, m.y, {
    walkPhase: m.walkPhase,
    walking: animate,
    bobPhase: m.bobPhase,
    dir: m.dir,
  });

  // Heart bubble while nuzzling
  if (m.state === 'nuzzling') {
    const wob = Math.sin(Date.now() * 0.006) * 2;
    ctx.save();
    ctx.fillStyle = '#ff77aa';
    drawHeart(sx, m.y - momHeight(m.speciesId) - 14 + wob, 8);
    ctx.restore();
  }
}

// =============================================================================
// HUD / BANNER
// =============================================================================
function drawHUD() {
  ctx.save();
  ctx.font = "bold 26px 'Comic Sans MS', cursive";
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
  ctx.fillText('🐾 ' + rescuedCount + '/' + babies.length, 14, 36);

  ctx.font = "16px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff5a8';
  if (!reunionTriggered) {
    ctx.fillText('Take babies to the vet!', 14, 60);
  } else if (dino && dino.state !== 'done') {
    ctx.fillText('Wait — the dino is leaving! 🦖', 14, 60);
  } else {
    ctx.fillText('The mommies are picking them up! 💕', 14, 60);
  }

  // Music indicator
  ctx.font = "16px serif";
  ctx.textAlign = 'right';
  ctx.fillStyle = musicState.on ? 'rgba(255,255,255,0.85)' : 'rgba(180,180,180,0.6)';
  ctx.fillText(musicState.on ? '🎵' : '🔇', W - 14, 36);

  // Hint text early on
  if (stateTimer < 360 && gameState === 'playing') {
    const fade = Math.max(0, 1 - stateTimer / 360);
    ctx.textAlign = 'center';
    ctx.font = "16px 'Comic Sans MS', cursive";
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.shadowBlur = 0;
    ctx.fillText('Arrows to fly • SPACE: lower basket • M: music', W / 2, 36);
    ctx.fillText("Land basket near a baby — they'll hop in!", W / 2, 60);
  }
  ctx.restore();

  // Off-screen indicators for injured babies
  if (gameState === 'playing' && !reunionTriggered) {
    for (const b of babies) {
      if (b.state !== 'injured') continue;
      const sx = b.x - camera.x;
      if (sx < 30) drawArrowIndicator(20, H * 0.5, '←', '#ffd44a');
      else if (sx > W - 30) drawArrowIndicator(W - 20, H * 0.5, '→', '#ffd44a');
    }
  }

  // Dino warning
  if (gameState === 'playing' && dino && dino.state !== 'done' && dino.spawnDelay === 0) {
    const sx = dino.x - camera.x;
    if (sx < -40) {
      drawArrowIndicator(40, H * 0.4, '🦖←', '#ff5566');
    } else if (sx > W + 40) {
      drawArrowIndicator(W - 40, H * 0.4, '→🦖', '#ff5566');
    }
  }
}
function drawArrowIndicator(x, y, ch, color) {
  ctx.save();
  ctx.font = "bold 36px 'Comic Sans MS', cursive";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.008);
  ctx.fillStyle = color; ctx.globalAlpha = pulse;
  ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
  ctx.fillText(ch, x, y);
  ctx.restore();
}

function drawTitleBanner() {
  if (gameState !== 'playing' || stateTimer > 240) return;
  const fade = Math.max(0, 1 - stateTimer / 240);
  ctx.save();
  ctx.font = "bold 28px 'Comic Sans MS', cursive";
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255, 153, 204, ${fade})`;
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6;
  ctx.fillText('🐾 Baby Animal Rescue 🐾', W / 2, 100);
  ctx.font = "bold 18px 'Comic Sans MS', cursive";
  ctx.fillStyle = `rgba(255, 245, 168, ${fade})`;
  ctx.fillText(currentTheme.name, W / 2, 128);
  ctx.restore();
}

// =============================================================================
// WIN SCREEN — family portraits
// =============================================================================
let winPhase = 0;
function drawWin() {
  if (gameState !== 'win') return;
  winPhase += 0.04;
  ctx.save();
  // Soft pink dim
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#3a1a3a';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Confetti
  for (let i = 0; i < 50; i++) {
    const x = ((i * 137 + (Date.now() * 0.05) % 137) % W);
    const y = ((Date.now() * 0.1 + i * 53) % H);
    const c = ['#ffd44a', '#ff7799', '#88c0ff', '#9bff77', '#bb88ff'][i % 5];
    ctx.fillStyle = c;
    ctx.fillRect(x, y, 4, 6);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.font = "bold 46px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#ffd44a';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
  const titleBob = Math.sin(winPhase * 2) * 4;
  ctx.fillText('💕 Everybody Home Safe! 💕', W / 2, 80 + titleBob);

  ctx.font = "22px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff';
  ctx.fillText('You rescued ' + babies.length + ' baby animals!', W / 2, 130);

  // Family portraits (mommy + baby together)
  const cellW = 160, cellH = 130;
  const cols = Math.min(4, Math.max(2, Math.ceil(Math.sqrt(babies.length))));
  const rows = Math.max(1, Math.ceil(babies.length / cols));
  const gridW = cols * cellW;
  const gridX = W / 2 - gridW / 2;
  const gridY = 170;
  for (let i = 0; i < babies.length; i++) {
    const r = Math.floor(i / cols), c = i % cols;
    const cx = gridX + c * cellW + cellW / 2;
    const cy = gridY + r * cellH + cellH / 2;
    drawFamilyPortrait(babies[i], cx, cy, i);
  }

  // Footer
  ctx.font = "20px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#aaccff';
  ctx.fillText('Tap or press space to play again 🚁', W / 2, H - 40);
  ctx.restore();
}

function drawGameOver() {
  if (gameState !== 'gameover') return;
  const a = Math.min(1, stateTimer / 60);
  ctx.save();
  ctx.globalAlpha = a * 0.75;
  ctx.fillStyle = '#1a1020';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = a;
  ctx.textAlign = 'center';
  ctx.font = "bold 42px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#ff8aaa';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
  ctx.fillText('🦖 The dino smashed the vet!', W / 2, H / 2 - 50);
  ctx.font = "26px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff5a8';
  ctx.fillText('Rescued: ' + rescuedCount + '   Eaten: ' + eatenCount, W / 2, H / 2);
  ctx.font = "22px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff';
  ctx.fillText('Tap or press space to try again 🚁', W / 2, H / 2 + 50);
  ctx.restore();
}

function drawFamilyPortrait(b, cx, cy, i) {
  const phase = winPhase * 1.5 + i * 0.6;
  const jump = Math.max(0, Math.sin(phase * 2) * 6);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 36, 50, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mommy on the left, baby on the right
  ctx.save();
  ctx.translate(cx - 22, cy - jump);
  ctx.scale(1.1, 1.1);
  drawAnimalAt(b.species.id, true, 0, 0, { walkPhase: 0, walking: false, bobPhase: phase, dir: 1 });
  ctx.restore();

  ctx.save();
  ctx.translate(cx + 26, cy - jump * 0.7 + 8);
  ctx.scale(1.4, 1.4);
  drawAnimalAt(b.species.id, false, 0, 0, { walkPhase: 0, walking: false, bobPhase: phase, dir: -1 });
  ctx.restore();

  // Heart between them
  ctx.fillStyle = '#ff77aa';
  ctx.save();
  ctx.translate(cx + 4, cy - 18 - jump);
  ctx.scale(1, 1);
  drawHeart(0, 0, 5);
  ctx.restore();

  // Name
  ctx.font = "bold 14px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff5a8';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
  ctx.fillText(b.species.babyName + ' & ' + b.species.momName, cx, cy + 56);
}

// =============================================================================
// LEVEL COMPLETE CHECK
// =============================================================================
function checkLevelTransitions() {
  if (gameState !== 'playing') return;

  const allRescued = (rescuedCount + eatenCount === SPECIES.length);
  const allInWindow = babies.every(b =>
    b.state === 'in_window' || b.state === 'reuniting' ||
    b.state === 'leaving'   || b.state === 'gone');
  const dinoGone = !dino || dino.state === 'done';

  // Phase 1: trigger reunion (sets the flag so the dino retreats, even if it
  // hasn't itself noticed yet) once all babies are tucked safely in windows.
  if (!reunionTriggered && allRescued && allInWindow) {
    reunionTriggered = true;
    floats.push(new FloatText(camera.x + W / 2, 100, '🌸 Everybody safe!', '#ff99cc'));
  }

  // Phase 2: once the dino is off-screen, the mommies start arriving (one at a
  // time). The first one is queued here; subsequent ones are queued in Phase 3.
  if (reunionTriggered && dinoGone && mommies.length === 0) {
    if (babies.some(b => b.state === 'in_window')) {
      playReunion();
      floats.push(new FloatText(camera.x + W / 2, 130, '🌸 The mommies are coming! 🌸', '#ff99cc'));
      spawnNextMommy();
    } else {
      // No survivors — sad ending
      gameState = 'gameover';
      stateTimer = 0;
      playSadSound();
    }
  }

  // Phase 3: every mommy has left and there are no more babies in windows → win.
  // (The next mommy is queued when the previous one starts leaving, so we don't
  // need to spawn here — only to detect the end of the celebration.)
  if (reunionTriggered && mommies.length > 0) {
    const allDone = mommies.every(m => m.state === 'gone');
    const noMore  = !babies.some(b => b.state === 'in_window');
    if (allDone && noMore) {
      gameState = 'win';
      stateTimer = 0;
      winPhase = 0;
      playWin();
    } else if (allDone && !noMore) {
      // Defensive fallback — shouldn't normally hit this with the leaving-queue
      spawnNextMommy();
    }
  }
}

// =============================================================================
// ADVANCE / RESTART
// =============================================================================
function tryAdvance() {
  if (gameState === 'win' && stateTimer > 60) {
    currentThemeIdx++;
    startLevel();
  } else if (gameState === 'gameover' && stateTimer > 60) {
    // Retry same theme — kid likely wants another go at this scene
    startLevel();
  }
}
canvas.addEventListener('click', tryAdvance);
canvas.addEventListener('touchstart', tryAdvance, { passive: true });
window.addEventListener('keydown', e => {
  if ((gameState === 'win' || gameState === 'gameover') && stateTimer > 30 &&
      (e.key === ' ' || e.key === 'Enter')) {
    tryAdvance();
  }
});

// =============================================================================
// MAIN LOOP
// =============================================================================
function update() {
  stateTimer++;
  pollGamepad();
  updateClouds();
  updateMusic();
  updateWeather();
  if (gameState !== 'playing') {
    updateParticles();
    floats.forEach(f => f.update());
    floats = floats.filter(f => f.life > 0);
    return;
  }
  levelTimer++;

  updateHelicopter();
  updateCage();
  updateBabies();
  updateDino();
  updateMommies();
  checkLevelTransitions();
  if (screenShake > 0) screenShake--;

  updateParticles();
  floats.forEach(f => f.update());
  floats = floats.filter(f => f.life > 0);
  cameraFollow(false);
}

function draw() {
  // Apply screen shake (decays each frame)
  ctx.save();
  if (screenShake > 0) {
    const m = Math.min(screenShake, 8);
    ctx.translate((Math.random() - 0.5) * m * 1.5, (Math.random() - 0.5) * m);
  }

  drawBackground();
  drawObstacles();
  drawVet();

  // Sort drawables by y so closer ones overlap correctly (slight depth)
  const drawables = [];
  for (const b of babies) {
    if (b.state === 'in_cage' || b.state === 'gone' || b.state === 'being_eaten' || b.state === 'in_window') continue;
    drawables.push({ y: b.y, draw: () => drawBaby(b) });
  }
  for (const m of mommies) {
    if (m.state === 'gone' || m.state === 'waiting') continue;
    drawables.push({ y: m.y, draw: () => drawMommy(m) });
  }
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();

  // Dinosaur draws on top (it's big and we want it always visible)
  if (dino && dino.state !== 'done') drawDinosaur(dino);

  drawCageAndCable();
  drawHelicopter();

  drawParticles();
  drawWeather();
  floats.forEach(f => f.draw());

  ctx.restore();

  drawTitleBanner();
  drawHUD();

  drawWin();
  drawGameOver();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startLevel();
loop();
</script>
